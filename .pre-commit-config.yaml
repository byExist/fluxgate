repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix]
      - id: ruff-format
        name: ruff format
  - repo: local
    hooks:
      - id: pyright
        name: pyright strict
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        name: markdownlint docs
        args: [--config, docs/.markdownlint.json]
        files: ^docs/.*\.(md|mdx)$
